name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  clippy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --check

  leaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard against leaked identifiers
        run: |
          # Patterns are built from fragments so this workflow does not match itself.
          # git grep exits 0 when it finds a match, so a hit trips the `if` and fails the build.
          org='wye''works'
          ip='10\.18''\.1\.2'
          # Skip this workflow file (it documents the patterns) to avoid self-matches.
          if git grep -nI -e "$org" -e "$ip" -- . ':!.github/workflows/ci.yml' ; then
            echo "Leaked identifier found in tracked files"
            exit 1
          fi
          # Only scan shipped assets for clear-session (src/ test fixtures legitimately use it).
          if git grep -nI 'clear-session' -- .claude/ ; then
            echo "Leaked identifier in shipped assets"
            exit 1
          fi
