    --secondary-container: #6cf8bb;
    --on-secondary-container: #00714d;
    --tertiary: #924700;
    --tertiary-container: #b75b00;
    --tertiary-fixed: #ffdcc6;
    --on-tertiary-fixed: #311400;
    --error: #ba1a1a;
    --error-container: #ffdad6;
    --on-surface: #191c1e;
    --on-surface-variant: #424754;
    --outline: #727785;
    --outline-variant: #c2c6d6;
    --inverse-surface: #2d3133;
    --inverse-on-surface: #eff1f3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--surface);
    color: var(--on-surface);
    height: 100%;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    line-height: 1;
    text-transform: none;
    letter-spacing: normal;
    word-wrap: normal;
    white-space: nowrap;
    direction: ltr;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  /* ============================================
     HEADER
     ============================================ */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    min-height: 56px;
    flex-shrink: 0;
  }

  .header .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header .header-icon {
    color: var(--primary);
    font-size: 24px;
  }

  .header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--on-surface);
  }

  .header .conn-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 9999px;
    background: var(--surface-container-low);
  }

  .header .conn-pill .conn-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .header .conn-pill .conn-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--on-surface-variant);
  }

  .header .back-btn {
    background: none;
    border: none;
    color: var(--primary);
    padding: 8px;
    margin-left: -8px;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .header .back-btn:active {
    background: var(--surface-container-low);
    transform: scale(0.95);
  }

  .header .detail-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* ============================================
     SESSION LIST
     ============================================ */
  .session-list-view {
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
  }

  .session-list-view.hidden { display: none; }

  .session-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 20px 24px;
  }

  .section-header {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--on-surface-variant);
    padding: 16px 0 10px;
  }

  .section-header.skipped-header {
    opacity: 0.6;
  }

  .session-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface-container-lowest);
    border-radius: 0.5rem;
    cursor: pointer;
    transition: transform 0.15s;
    margin-bottom: 10px;
  }

  .session-item:active {
    transform: scale(0.98);
  }

  .session-item .emoji-box {
    width: 48px;
    height: 48px;
    border-radius: 0.5rem;
    background: var(--surface-container-low);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .session-item .info {
    flex: 1;
    min-width: 0;
  }

  .session-item .name-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .session-item .name {
    font-size: 14px;
    font-weight: 700;
    color: var(--on-surface);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  .session-item .status-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  .session-item .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .session-item .status-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .session-item .meta {
    display: flex;
    gap: 12px;
    margin-top: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--on-surface-variant);
  }

  /* Skipped session styling */
  .session-item.skipped {
    background: var(--surface-container-high);
    color: var(--on-surface-variant);
  }

  .session-item.skipped .emoji-box {
    width: 40px;
    height: 40px;
    font-size: 18px;
    background: var(--surface-container-highest);
  }

  /* ============================================
     DETAIL VIEW
     ============================================ */
  .detail-view {
    display: none;
    flex-direction: column;
    height: 100%;
    background: var(--surface);
    z-index: 10;
    overflow: hidden;
    position: relative;
  }

  .detail-view.active { display: flex; }

  .detail-status {
    padding: 20px 20px 16px;
    flex-shrink: 0;
  }

  .detail-status .session-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--on-surface);
    margin-bottom: 8px;
  }

  .detail-status .badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 9999px;
  }

  .badge .badge-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }

  .badge.idle {
    background: var(--secondary-container);
    color: var(--on-secondary-container);
  }
  .badge.idle .badge-dot { background: var(--secondary); }

  .badge.busy {
    background: var(--error-container);
    color: var(--on-error-container);
  }
  .badge.busy .badge-dot { background: var(--error); }

  .badge.attention {
    background: var(--tertiary-fixed);
    color: var(--on-tertiary-fixed);
  }
  .badge.attention .badge-dot { background: var(--tertiary-container); }

  .badge.cpu {
    background: var(--surface-container-high);
    color: var(--on-surface-variant);
  }

  /* ============================================
     CHAT AREA
     ============================================ */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }

  .chat-msg {
    max-width: 90%;
    font-size: 14px;
    line-height: 1.55;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .chat-msg.assistant {
    align-self: flex-start;
  }

  .chat-msg.assistant .msg-bubble {
    background: var(--surface-container-lowest);
    border: 1px solid rgba(194, 198, 214, 0.15);
    border-radius: 16px;
    border-top-left-radius: 4px;
    padding: 14px 18px;
    color: var(--on-surface-variant);
  }

  .chat-msg.user {
    align-self: flex-end;
  }

  .chat-msg.user .msg-bubble {
    background: var(--primary-fixed);
    color: var(--on-primary-fixed);
    border-radius: 16px;
    border-top-right-radius: 4px;
    padding: 12px 16px;
  }

  .chat-msg .role-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    color: var(--on-surface-variant);
  }

  .chat-msg.user .role-label {
    color: rgba(0, 26, 66, 0.5);
    text-align: right;
  }

  .chat-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--outline);
    font-size: 14px;
  }

  .jump-bottom {
    position: absolute;
    bottom: 16px;
    right: 24px;
    z-index: 5;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface-container-lowest);
    border: 1px solid var(--outline-variant);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--on-surface-variant);
    transition: opacity 0.15s, transform 0.15s;
  }

  .jump-bottom:active { transform: scale(0.9); }
  .jump-bottom.hidden { display: none; }

  /* Markdown styles inside assistant messages */
  .chat-msg h1, .chat-msg h2, .chat-msg h3 {
    margin: 10px 0 4px 0;
    line-height: 1.3;
    color: var(--on-surface);
    font-weight: 700;
  }
  .chat-msg h1 { font-size: 17px; }
  .chat-msg h2 { font-size: 15px; }
  .chat-msg h3 { font-size: 14px; }
  .chat-msg h1:first-child, .chat-msg h2:first-child, .chat-msg h3:first-child {
    margin-top: 0;
  }

  .chat-msg p { margin: 6px 0; }
  .chat-msg p:first-child { margin-top: 0; }
  .chat-msg p:last-child { margin-bottom: 0; }

  .chat-msg code {
    background: var(--surface-container);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 12.5px;
    color: var(--primary);
  }

  .chat-msg pre {
    background: var(--inverse-surface) !important;
    color: var(--inverse-on-surface);
    border-radius: 0.5rem;
    padding: 12px 14px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
    line-height: 1.5;
  }

  /* Prism overrides for dark code blocks */
  .chat-msg pre code[class*="language-"],
  .chat-msg pre[class*="language-"] {
    background: var(--inverse-surface) !important;
    color: var(--inverse-on-surface) !important;
    text-shadow: none !important;
  }

  .chat-msg .token.comment { color: #8b949e; }
  .chat-msg .token.string { color: #a5d6ff; }
  .chat-msg .token.keyword { color: #ff7b72; }
  .chat-msg .token.function { color: #d2a8ff; }
  .chat-msg .token.number { color: #79c0ff; }
  .chat-msg .token.operator { color: #ff7b72; }
  .chat-msg .token.punctuation { color: #c9d1d9; }
  .chat-msg .token.property { color: #79c0ff; }
  .chat-msg .token.boolean { color: #79c0ff; }
  .chat-msg .token.class-name { color: #ffa657; }

  .chat-msg pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
    color: inherit;
  }

  .chat-msg ul, .chat-msg ol {
    margin: 6px 0;
    padding-left: 20px;
  }

  .chat-msg li { margin: 2px 0; }

  .chat-msg strong { font-weight: 700; color: var(--on-surface); }
  .chat-msg em { font-style: italic; }

  .chat-msg a {
    color: var(--primary);
    text-decoration: none;
  }

  .chat-msg blockquote {
    border-left: 3px solid var(--outline-variant);
    padding-left: 12px;
    margin: 6px 0;
    color: var(--on-surface-variant);
  }

  .md-table-wrap {
    overflow-x: auto;
    margin: 8px 0;
    -webkit-overflow-scrolling: touch;
  }

  .chat-msg table {
    border-collapse: collapse;
    font-size: 12px;
    width: 100%;
    min-width: max-content;
  }

  .chat-msg th, .chat-msg td {
    padding: 6px 10px;
    text-align: left;
    white-space: nowrap;
  }

  .chat-msg th {
    background: var(--surface-container-high);
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--on-surface-variant);
  }

  .chat-msg td {
    background: var(--surface-container-low);
    color: var(--on-surface);
  }

  .chat-msg tr:nth-child(even) td {
    background: var(--surface-container);
  }

  .chat-msg hr {
    border: none;
    border-top: 1px solid var(--outline-variant);
    margin: 10px 0;
  }

  /* ============================================
     TOOL CARDS
     ============================================ */
  .tool-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-container-low);
    border: 1px solid rgba(194, 198, 214, 0.2);
    border-radius: 16px;
    border-top-left-radius: 4px;
    padding: 10px 12px;
    margin: 6px 0;
    cursor: pointer;
    transition: transform 0.15s;
    font-size: 13px;
  }

  .tool-card:active { transform: scale(0.97); }

  .tool-card .tool-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface-container-lowest);
  }

  .tool-card .tool-icon .material-symbols-outlined {
    font-size: 20px;
  }

  .tool-icon.bash { color: var(--primary); }
  .tool-icon.write { color: var(--secondary); }
  .tool-icon.edit { color: var(--tertiary); }
  .tool-icon.read { color: var(--primary); }
  .tool-icon.grep { color: var(--outline); }
  .tool-icon.agent { color: var(--error); }
  .tool-icon.other { color: var(--on-surface-variant); }

  .tool-card .tool-info { flex: 1; min-width: 0; }

  .tool-card .tool-name {
    font-weight: 700;
    font-size: 12px;
    color: var(--on-surface);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .tool-card .tool-summary {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--on-surface-variant);
    font-size: 12px;
    margin-top: 1px;
  }

  .tool-card .tool-chevron {
    color: var(--on-surface-variant);
    flex-shrink: 0;
    font-size: 18px;
  }

  /* ============================================
     MODAL OVERLAY (Bottom Sheet)
     ============================================ */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(25, 28, 30, 0.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-sheet {
    background: var(--surface-container-lowest);
    border-radius: 2rem 2rem 0 0;
    width: 100%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.25s ease-out;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    display: flex;
    justify-content: center;
    padding-top: 12px;
    padding-bottom: 8px;
  }

  .modal-handle-bar {
    width: 48px;
    height: 5px;
    border-radius: 9999px;
    background: rgba(194, 198, 214, 0.3);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 16px;
    flex-shrink: 0;
  }

  .modal-header .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--on-surface);
  }

  .modal-header .modal-close {
    background: none;
    border: none;
    color: var(--on-surface-variant);
    padding: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.15s;
  }

  .modal-header .modal-close:hover {
    background: var(--surface-container-low);
  }

  .modal-body {
    padding: 0 20px 24px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    flex: 1;
  }

  /* Tool section header (icon + label) */
  .tool-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 4px;
    margin-bottom: 12px;
  }

  .tool-section-icon {
    width: 32px; height: 32px;
    border-radius: 0.5rem;
    background: var(--surface-container);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--on-surface-variant);
  }

  .tool-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--on-surface-variant);
  }

  /* Terminal code block */
  .terminal-block {
    background: #1e1e1e;
    padding: 16px 20px;
    border-radius: 0.75rem;
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: #93c5fd;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .terminal-block .prompt { color: #4ade80; }

  .terminal-block .copy-btn {
    position: absolute;
    top: 10px; right: 10px;
    display: flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.1);
    border: none; color: rgba(255,255,255,0.7);
    font-size: 10px; font-weight: 500;
    padding: 4px 8px; border-radius: 6px;
    cursor: pointer; backdrop-filter: blur(8px);
  }

  .terminal-block .copy-btn:active { background: rgba(255,255,255,0.25); }

  /* File viewer (Edit/Write) */
  .file-viewer {
    border-radius: 0.75rem;
    overflow: hidden;
    border: 1px solid rgba(194, 198, 214, 0.2);
  }

  .file-viewer-header {
    padding: 8px 14px;
    background: var(--surface-container-high);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--on-surface-variant);
    font-family: 'SF Mono', 'Menlo', monospace;
  }

  .file-viewer-header .material-symbols-outlined { font-size: 16px; }

  .file-viewer-body {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 12px;
    line-height: 1.8;
    padding: 0;
  }

  .diff-line {
    display: flex;
    padding: 0 12px;
  }

  .diff-line .line-no {
    width: 36px;
    text-align: right;
    padding-right: 12px;
    color: var(--outline-variant);
    user-select: none;
    flex-shrink: 0;
  }

  .diff-line .line-no {
    color: var(--outline-variant);
  }

  .diff-line.del {
    background: rgba(186, 26, 26, 0.08);
    color: var(--error);
    border-left: 2px solid var(--error);
  }

  .diff-line.del .line-no { color: rgba(186, 26, 26, 0.5); }

  .diff-line.add {
    background: rgba(0, 108, 73, 0.08);
    color: var(--secondary);
    border-left: 2px solid var(--secondary);
  }

  .diff-line.add .line-no { color: rgba(0, 108, 73, 0.5); }

  .write-body {
    padding: 14px 16px;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 12px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--on-surface);
  }

  /* Generic fallback */
  .modal-body pre {
    background: var(--inverse-surface);
    color: var(--inverse-on-surface);
    border-radius: 0.75rem;
    padding: 14px 16px;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-x: auto;
  }

  /* ============================================
     TTS BAR
     ============================================ */
  .tts-bar {
    display: none;
    padding: 8px 16px 0;
    justify-content: center;
  }

  .tts-bar.visible { display: flex; }

  .tts-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(194, 198, 214, 0.15);
    border-radius: 9999px;
    color: var(--primary);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 16px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    transition: transform 0.15s;
  }

  .tts-btn:active { transform: scale(0.95); }
  .tts-btn.busy-state {
    background: var(--surface-container-high);
    color: var(--on-surface-variant);
    border-color: transparent;
  }

  .tts-btn .tts-icon {
    font-size: 18px;
  }

  @keyframes tts-pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .tts-btn.loading .tts-label {
    animation: tts-pulse 1s ease-in-out infinite;
  }

  /* ============================================
     BOTTOM BAR
     ============================================ */
  .bottom-bar {
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(24px);
    border-top: 1px solid rgba(194, 198, 214, 0.15);

<script>
let sessions = [];
let selectedSession = null;
let currentMessages = [];
let pollTimer = null;
let msgPollTimer = null;
let wasAtBottom = true;

// --- Markdown renderer ---
function renderTable(tableLines) {
  const parseRow = line => line.split('|').slice(1, -1).map(c => c.trim());
  const headers = parseRow(tableLines[0]);
  // Skip separator row (row 1 with dashes)
  const startRow = (tableLines.length > 1 && /^[\s|:-]+$/.test(tableLines[1])) ? 2 : 1;
  let html = '<div class="md-table-wrap"><table><thead><tr>';
  headers.forEach(h => { html += '<th>' + inlineMarkdown(h) + '</th>'; });
  html += '</tr></thead><tbody>';
  for (let r = startRow; r < tableLines.length; r++) {
    const cells = parseRow(tableLines[r]);
    html += '<tr>';
    cells.forEach(c => { html += '<td>' + inlineMarkdown(c) + '</td>'; });
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

function renderMarkdown(src) {
  // Normalize line endings
  src = src.replace(/\r\n/g, '\n');

  // Extract fenced code blocks first to protect them
  const codeBlocks = [];
  src = src.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const langClass = lang ? ' class="language-' + lang + '"' : '';
    codeBlocks.push('<pre><code' + langClass + '>' + esc(code.replace(/\n$/, '')) + '</code></pre>');
    return '\x00CB' + (codeBlocks.length - 1) + '\x00';
  });

  // Process blocks
  const lines = src.split('\n');
  let html = '';
  let i = 0;
  let inList = false;
  let listType = '';

  function closePendingList() {
    if (inList) {
      html += listType === 'ul' ? '</ul>' : '</ol>';
      inList = false;
    }
  }

  while (i < lines.length) {
    const line = lines[i];

    // Code block placeholder
    const cbMatch = line.match(/^\x00CB(\d+)\x00$/);
    if (cbMatch) {
      closePendingList();
      html += codeBlocks[parseInt(cbMatch[1])];
      i++; continue;
    }

    // Headings
    const hMatch = line.match(/^(#{1,3})\s+(.+)/);
    if (hMatch) {
      closePendingList();
      const level = hMatch[1].length;
      html += `<h${level}>${inlineMarkdown(hMatch[2])}</h${level}>`;
      i++; continue;
    }

    // Horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
      closePendingList();
      html += '<hr>';
      i++; continue;
    }

    // Blockquote
    if (line.startsWith('> ')) {
      closePendingList();
      let quote = '';
      while (i < lines.length && lines[i].startsWith('> ')) {
        quote += lines[i].slice(2) + '\n';
        i++;
      }
      html += '<blockquote>' + renderMarkdown(quote.trim()) + '</blockquote>';
      continue;
    }

    // Table
    if (line.includes('|') && line.trim().startsWith('|')) {
      closePendingList();
      const tableLines = [];
      while (i < lines.length && lines[i].includes('|') && lines[i].trim().startsWith('|')) {
        tableLines.push(lines[i]);
        i++;
      }
      if (tableLines.length >= 2) {
        html += renderTable(tableLines);
      }
      continue;
    }

    // Unordered list
    const ulMatch = line.match(/^(\s*)[*\-+]\s+(.*)/);
    if (ulMatch) {
      if (!inList || listType !== 'ul') {
        closePendingList();
        html += '<ul>';
        inList = true; listType = 'ul';
      }
      html += '<li>' + inlineMarkdown(ulMatch[2]) + '</li>';
      i++; continue;
    }

    // Ordered list
    const olMatch = line.match(/^(\s*)\d+\.\s+(.*)/);
    if (olMatch) {
      if (!inList || listType !== 'ol') {
        closePendingList();
        html += '<ol>';
        inList = true; listType = 'ol';
      }
      html += '<li>' + inlineMarkdown(olMatch[2]) + '</li>';
      i++; continue;
    }

    // Close list if we hit a non-list line
    closePendingList();

    // Empty line
    if (line.trim() === '') {
      i++; continue;
    }

    // Paragraph — collect consecutive non-empty lines
    let para = '';
    while (i < lines.length && lines[i].trim() !== '' &&
           !lines[i].match(/^#{1,3}\s/) &&
           !lines[i].match(/^[*\-+]\s/) &&
           !lines[i].match(/^\d+\.\s/) &&
           !lines[i].startsWith('> ') &&
           !lines[i].match(/^\x00CB/) &&
           !lines[i].match(/^(-{3,}|\*{3,}|_{3,})\s*$/) &&
           !(lines[i].includes('|') && lines[i].trim().startsWith('|'))) {
      if (para) para += '\n';
      para += lines[i];
      i++;
    }
    html += '<p>' + inlineMarkdown(para) + '</p>';
  }

  closePendingList();
  return html;
}

function inlineMarkdown(text) {
  // Inline code (must come first to protect contents)
  const codes = [];
  text = text.replace(/`([^`]+)`/g, (_, code) => {
    codes.push('<code>' + esc(code) + '</code>');
    return '\x00IC' + (codes.length - 1) + '\x00';
  });

  // Escape HTML in remaining text
  text = esc(text);

  // Bold + italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/_(.+?)_/g, '<em>$1</em>');
  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Line breaks
  text = text.replace(/\n/g, '<br>');

  // Restore inline code
  text = text.replace(/\x00IC(\d+)\x00/g, (_, idx) => codes[parseInt(idx)]);

  return text;
}

// --- Tool rendering ---
function toolIconName(name) {
  const n = name.toLowerCase();
  if (n === 'bash' || n === 'task') return 'terminal';
  if (n === 'write') return 'edit_note';
  if (n === 'edit') return 'edit';
  if (n === 'read') return 'menu_book';
  if (n === 'grep' || n === 'glob') return 'search';
  if (n === 'agent') return 'smart_toy';
  return 'build';
}

function toolIconClass(name) {
  const n = name.toLowerCase();
  if (n === 'bash' || n === 'task') return 'bash';
  if (n === 'write') return 'write';
  if (n === 'edit') return 'edit';
  if (n === 'read') return 'read';
  if (n === 'grep' || n === 'glob') return 'grep';
  if (n === 'agent') return 'agent';
  return 'other';
}

function toolIconLabel(name) {
  const map = { Bash: '$', Write: 'W', Edit: 'E', Read: 'R', Grep: '/', Glob: '*', Agent: 'A', Task: '$' };
  return map[name] || name.charAt(0);
}

// Store tool details in a map keyed by unique ID (avoids inline onclick escaping issues)
const toolDetailStore = {};

function renderToolCards(tools) {
  if (!tools || !tools.length) return '';
  return tools.map((t) => {
    const id = 'td_' + Math.random().toString(36).slice(2, 10);
    toolDetailStore[id] = { name: t.name, detail: t.detail };
    return `<div class="tool-card" data-tool-id="${id}">
      <div class="tool-icon ${toolIconClass(t.name)}"><span class="material-symbols-outlined">${toolIconName(t.name)}</span></div>
      <div class="tool-info">
        <div class="tool-name">${esc(t.name)}</div>
        <div class="tool-summary">${esc(t.summary)}</div>
      </div>
      <span class="material-symbols-outlined tool-chevron">chevron_right</span>
    </div>`;
  }).join('');
}

// Compute unified diff between two arrays of lines using LCS
function unifiedDiffHtml(oldLines, newLines) {
  // Build LCS table
  const m = oldLines.length, n = newLines.length;
  const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = oldLines[i-1] === newLines[j-1]
        ? dp[i-1][j-1] + 1
        : Math.max(dp[i-1][j], dp[i][j-1]);
    }
  }

  // Backtrack to produce diff operations
  const ops = []; // {type: 'ctx'|'del'|'add', text}
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && oldLines[i-1] === newLines[j-1]) {
      ops.push({type: 'ctx', text: oldLines[i-1]});
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      ops.push({type: 'add', text: newLines[j-1]});
      j--;
    } else {
      ops.push({type: 'del', text: oldLines[i-1]});
      i--;
    }
  }
  ops.reverse();

  return ops.map(op => {
    const prefix = op.type === 'del' ? '-' : op.type === 'add' ? '+' : ' ';
    const cls = op.type === 'del' ? ' del' : op.type === 'add' ? ' add' : '';
    return `<div class="diff-line${cls}"><span class="line-no">${prefix}</span><span>${esc(op.text || ' ')}</span></div>`;
  }).join('');
}

function renderModalContent(name, detail) {
  const toolType = name.toLowerCase();

  if (toolType === 'bash' || toolType === 'task') {
    return `<div class="tool-section-header">
        <div class="tool-section-icon"><span class="material-symbols-outlined">terminal</span></div>
        <span class="tool-section-label">BASH</span>
      </div>
      <div class="terminal-block">
        <button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.querySelector('.cmd-text').textContent)">
          <span class="material-symbols-outlined" style="font-size:14px">content_copy</span> Copy
        </button>
        <span class="cmd-text"><span class="prompt">$</span> ${esc(detail)}</span>
      </div>`;
  }

  if (toolType === 'edit') {
    // Parse: "filepath\n\n--- old ---\nold_text\n\n+++ new +++\nnew_text"
    const parts = detail.split('\n\n');
    const filepath = parts[0] || '';
    const filename = filepath.split('/').pop() || filepath;
    let oldText = '', newText = '';
    let mode = '';
    for (let p = 1; p < parts.length; p++) {
      if (parts[p].startsWith('--- old ---')) { mode = 'old'; oldText = parts[p].replace(/^--- old ---\n?/, ''); continue; }
      if (parts[p].startsWith('+++ new +++')) { mode = 'new'; newText = parts[p].replace(/^\+\+\+ new \+\+\+\n?/, ''); continue; }
      if (mode === 'old') oldText += '\n\n' + parts[p];
      if (mode === 'new') newText += '\n\n' + parts[p];
    }

    // Line-level diff using LCS to produce unified interleaved output
    const diffHtml = unifiedDiffHtml(oldText.split('\n'), newText.split('\n'));

    return `<div class="tool-section-header">
        <div class="tool-section-icon"><span class="material-symbols-outlined">difference</span></div>
        <span class="tool-section-label">EDIT</span>
      </div>
      <div class="file-viewer">
        <div class="file-viewer-header">
          <span class="material-symbols-outlined">description</span>
          ${esc(filename)}
        </div>
        <div class="file-viewer-body">${diffHtml}</div>
      </div>`;
  }

  if (toolType === 'write') {
    // Parse: "filepath\n\ncontent"
    const idx = detail.indexOf('\n\n');
    const filepath = idx >= 0 ? detail.slice(0, idx) : '';
    const content = idx >= 0 ? detail.slice(idx + 2) : detail;
    const filename = filepath.split('/').pop() || filepath;
    return `<div class="tool-section-header">
        <div class="tool-section-icon"><span class="material-symbols-outlined">description</span></div>
        <span class="tool-section-label">WRITE</span>
      </div>
      <div class="file-viewer">
        <div class="file-viewer-header">
          <span class="material-symbols-outlined">description</span>
          ${esc(filename)}
        </div>
        <div class="write-body">${esc(content)}</div>
      </div>`;
  }

  if (toolType === 'read') {
    return `<div class="tool-section-header">
        <div class="tool-section-icon"><span class="material-symbols-outlined">menu_book</span></div>
        <span class="tool-section-label">READ</span>
      </div>
      <div class="file-viewer">
        <div class="file-viewer-header">
          <span class="material-symbols-outlined">description</span>
          ${esc(detail.split('/').pop() || detail)}
        </div>
        <div class="write-body">${esc(detail)}</div>
      </div>`;
  }

  // Fallback: generic pre block
  return `<pre>${esc(detail)}</pre>`;
}

// Event delegation for tool card clicks
document.addEventListener('click', (e) => {
  const card = e.target.closest('.tool-card');
  if (!card) return;
  const id = card.getAttribute('data-tool-id');
  const info = toolDetailStore[id];
  if (!info) return;
  document.getElementById('modalTitle').textContent = info.name;
  const mc = document.getElementById('modalContent');
  mc.innerHTML = renderModalContent(info.name, info.detail);
  if (window.Prism) Prism.highlightAllUnder(mc);
  document.getElementById('toolModal').classList.add('active');
  history.pushState({ view: 'modal' }, '');
});

function closeModal(event) {
  if (event && event.target !== document.getElementById('toolModal') && !event.target.classList.contains('modal-close') && !event.target.closest('.modal-close')) return;
  document.getElementById('toolModal').classList.remove('active');
}

// --- Status helpers ---
function statusInfo(s) {
  if (!s || !s.status) return { label: 'No Claude', cls: 'working', color: 'var(--outline)', dotColor: 'var(--outline)', needsAction: false };
  const st = s.status;
  if (st === 'Waiting') return { label: 'Idle', cls: 'idle', color: 'var(--secondary)', dotColor: 'var(--secondary)', needsAction: false };
  if (st === 'Working') return { label: 'Busy', cls: 'busy', color: 'var(--error)', dotColor: 'var(--error)', needsAction: false };
  if (st === 'QuestionAsked') return { label: 'Question', cls: 'attention', color: 'var(--tertiary-container)', dotColor: 'var(--tertiary-container)', needsAction: true };
  if (st === 'PlanReview') return { label: 'Plan Review', cls: 'attention', color: 'var(--tertiary-container)', dotColor: 'var(--tertiary-container)', needsAction: true };
  if (typeof st === 'object') {
    if (st.NeedsPermission) return { label: 'Permission', cls: 'attention', color: 'var(--tertiary-container)', dotColor: 'var(--tertiary-container)', needsAction: true };
    if (st.EditApproval) return { label: 'Edit Approval', cls: 'attention', color: 'var(--tertiary)', dotColor: 'var(--tertiary)', needsAction: true };
  }
  return { label: 'Busy', cls: 'busy', color: 'var(--error)', dotColor: 'var(--error)', needsAction: false };
}

function statusDetail(s) {
  if (!s || !s.status) return '';
  const st = s.status;
  if (typeof st === 'object') {
    if (st.NeedsPermission) {
      let d = st.NeedsPermission.tool_name || '';
      if (st.NeedsPermission.description) d += ' — ' + st.NeedsPermission.description;
      return d;
    }
    if (st.EditApproval) return 'File: ' + st.EditApproval.filename;
  }
  return '';
}

// --- Rendering ---
function extractEmoji(name) {
  // Try to extract leading emoji from session name
  const emojiMatch = name.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F?)/u);
  if (emojiMatch && emojiMatch[0]) {
    return { emoji: emojiMatch[0], rest: name.slice(emojiMatch[0].length).trim() };
  }
  return { emoji: '', rest: name };
}

function renderSessionItem(s, isSkipped) {
  const si = statusInfo(s);
  const { emoji, rest } = extractEmoji(s.name);
  const displayEmoji = emoji || '\u{1F4BB}';
  const displayName = rest || s.name;
  const cpu = s.cpu > 0 ? 'CPU ' + s.cpu.toFixed(0) + '%' : '';
  const mem = s.mem_kb > 0 ? 'MEM ' + Math.round(s.mem_kb / 1024) + 'MB' : '';
  const metaParts = [cpu, mem].filter(Boolean);
  const skippedClass = isSkipped ? ' skipped' : '';
  const swipeLabel = isSkipped ? 'Unskip' : 'Skip';
  const swipeClass = isSkipped ? 'unskip-action' : 'skip-action';
  const todoBadge = (s.todo_count && s.todo_count > 0)
    ? `<span class="todo-badge"><span class="material-symbols-outlined">checklist</span>${s.todo_count}</span>`
    : '';
  if (todoBadge) metaParts.push(null); // placeholder, we'll append the badge HTML directly

  return `<div class="session-item-wrapper" data-session-name="${esc(s.name)}">
    <div class="swipe-action ${swipeClass}">${swipeLabel}</div>
    <div class="session-item${skippedClass}" onclick="selectSession('${encodeURIComponent(s.name)}')">
      <div class="emoji-box">${displayEmoji}</div>
      <div class="info">
        <div class="name-row">
          <div class="name">${esc(displayName)}</div>
          ${!isSkipped ? `<div class="status-indicator">
            <span class="status-dot" style="background:${si.dotColor}"></span>
            <span class="status-label" style="color:${si.color}">${si.label}</span>
          </div>` : '<span class="status-label" style="color:var(--on-surface-variant);font-size:10px;font-weight:700;text-transform:uppercase">INACTIVE</span>'}
        </div>
        <div class="meta">${[cpu, mem].filter(Boolean).map(m => '<span>' + esc(m) + '</span>').join('')}${todoBadge}</div>
      </div>
    </div>
  </div>`;
}

function renderList() {
  const el = document.getElementById('sessionList');
  if (!sessions.length) {
    el.innerHTML = '<div class="loading">No sessions found</div>';
    return;
  }
  const active = sessions.filter(s => !s.skipped);
  const skipped = sessions.filter(s => s.skipped);

  let html = '<div class="section-header">ACTIVE SESSIONS</div>';
  html += active.map(s => renderSessionItem(s, false)).join('');
  if (skipped.length) {
    html += '<div class="section-header skipped-header">SKIPPED</div>';
    html += skipped.map(s => renderSessionItem(s, true)).join('');
  }
  el.innerHTML = html;
}

function updateDetailBadges(s) {
  const si = statusInfo(s);
  document.getElementById('detailDot').style.background = si.dotColor;

  const badges = document.getElementById('detailBadges');
  let badgeHtml = `<span class="badge ${si.cls}"><span class="badge-dot"></span>${si.label}</span>`;
  if (s.cpu > 0) badgeHtml += `<span class="badge cpu">${s.cpu.toFixed(1)}% CPU</span>`;
  const detail = statusDetail(s);
  if (detail) badgeHtml += `<span class="badge attention">${esc(detail)}</span>`;
  badges.innerHTML = badgeHtml;

  const qa = document.getElementById('quickActions');
  if (si.needsAction) {
    qa.classList.remove('hidden');
  } else {
    qa.classList.add('hidden');
  }
}

function renderDetail() {
  if (!selectedSession) return;
  const s = sessions.find(x => x.name === selectedSession);
  if (!s) return;

  document.getElementById('detailName').textContent = s.name;
  updateDetailBadges(s);
  renderMessages();
}

function renderMessages() {
  const chatArea = document.getElementById('chatArea');
  const isAtBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 40;

  if (currentMessages.length === 0) {
    chatArea.innerHTML = '<div class="chat-empty">No messages yet</div>';
  } else {
    let prevRole = '';
    chatArea.innerHTML = currentMessages.map((m, idx) => {
      const showLabel = m.role !== prevRole;
      prevRole = m.role;
      const roleLabel = m.role === 'assistant' ? 'Claude' : 'You';
      const textHtml = m.text ? (m.role === 'assistant' ? renderMarkdown(m.text) : esc(m.text)) : '';
      const toolsHtml = m.role === 'assistant' ? renderToolCards(m.tools) : '';
      const hasContent = textHtml || toolsHtml;
      if (!hasContent) return '';
      return `<div class="chat-msg ${m.role}">
        ${showLabel ? `<div class="role-label">${roleLabel}</div>` : ''}
        ${textHtml ? `<div class="msg-bubble"><div>${textHtml}</div></div>` : ''}
        ${toolsHtml}
      </div>`;
    }).join('');

    if (isAtBottom || wasAtBottom) {
      chatArea.scrollTop = chatArea.scrollHeight;
    }
  }

  // Show/hide TTS button based on whether there's an assistant message
  const ttsBar = document.getElementById('ttsBar');
  const hasAssistant = currentMessages.some(m => m.role === 'assistant' && m.text);
  if (ttsEnabled && hasAssistant) {
    ttsBar.classList.add('visible');
  } else {
    ttsBar.classList.remove('visible');
  }

  // Syntax highlight code blocks
  if (window.Prism) Prism.highlightAllUnder(chatArea);
}

// --- Navigation (uses History API so iOS back gesture works) ---
function selectSession(encodedName) {
  stopTts();

  selectedSession = decodeURIComponent(encodedName);
  currentMessages = [];
  lastMessagesJson = '';
  wasAtBottom = true;
  history.pushState({ view: 'detail', session: selectedSession }, '');
  showDetailView();
  fetchMessages();
  startMessagePolling();
}

function showList() {
  selectedSession = null;
  currentMessages = [];
  stopMessagePolling();
  stopTts();
  document.getElementById('listView').classList.remove('hidden');
  document.getElementById('detailView').classList.remove('active');
}

function showDetailView() {
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('detailView').classList.add('active');
  renderDetail();
}

let lastMessagesJson = '';

async function fetchMessages() {
  if (!selectedSession) return;
  try {
    const res = await fetch('/api/messages?session=' + encodeURIComponent(selectedSession));
    const json = await res.text();
    if (json === lastMessagesJson) return; // No change, skip re-render
    lastMessagesJson = json;
    const chatArea = document.getElementById('chatArea');
    wasAtBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 40;
    currentMessages = JSON.parse(json);
    renderMessages();
  } catch (e) { /* ignore */ }
}

function startMessagePolling() {
  stopMessagePolling();
  msgPollTimer = setInterval(fetchMessages, 2000);
}

function stopMessagePolling() {
  if (msgPollTimer) { clearInterval(msgPollTimer); msgPollTimer = null; }
}

// Handle browser back gesture / back button
window.addEventListener('popstate', (e) => {
  // Close info modal first
  if (document.getElementById('infoModal').classList.contains('active')) {
    document.getElementById('infoModal').classList.remove('active');
    if (selectedSession) {
      history.pushState({ view: 'detail', session: selectedSession }, '');
    }
    return;
  }
  // Close tool modal
  if (document.getElementById('toolModal').classList.contains('active')) {
    document.getElementById('toolModal').classList.remove('active');
    // Re-push state so detail view stays
    if (selectedSession) {
      history.pushState({ view: 'detail', session: selectedSession }, '');
    }
    return;
  }
  // Close picker modal
  if (document.getElementById('pickerModal').classList.contains('active')) {
    document.getElementById('pickerModal').classList.remove('active');
    return;
  }
  showList();
});

// Push initial state so first back doesn't leave the page
history.replaceState({ view: 'list' }, '');

// --- Sending ---
async function sendQuick(text) {
  if (!selectedSession) return;
  const s = sessions.find(x => x.name === selectedSession);
  if (!s || !s.pane) return;
  try {
    await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: s.name, text: text })
    });
  } catch (e) { /* ignore */ }
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !selectedSession) return;
  input.value = '';
  wasAtBottom = true;
  await sendQuick(text);
}

// --- Polling ---
let lastSessionsJson = '';

async function fetchSessions() {
  try {
    const res = await fetch('/api/sessions');
    const json = await res.text();
    document.getElementById('connDot').style.background = 'var(--secondary)';

    // Only re-render the list if the session data actually changed
    if (json !== lastSessionsJson) {
      lastSessionsJson = json;
      sessions = JSON.parse(json);
      renderList();
    } else {
      sessions = JSON.parse(json);
    }

    // In detail view, only update badges (not chat — that has its own poll)
    if (selectedSession) {
      const s = sessions.find(x => x.name === selectedSession);
      if (s) updateDetailBadges(s);
    }
  } catch (e) {
    document.getElementById('connDot').style.background = 'var(--error)';
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- TTS ---
let ttsEnabled = false;
let ttsAudio = null;

// Persistent audio element in the DOM — iOS needs this for reliable playback.
// We create it once, reuse it, and "unlock" it on the first user tap.
// TTS player — get from DOM element (iOS needs it visible and in the document)
const ttsPlayer = document.getElementById('ttsVideo');

async function initTts() {
  try {
    const res = await fetch('/api/config');
    const cfg = await res.json();
    ttsEnabled = cfg.tts === true;
    if (ttsEnabled) {
      document.getElementById('ttsBar').classList.add('visible');
    }
  } catch (e) { /* TTS stays disabled */ }
}

let ttsGenerating = false;
let ttsCachedText = null;
let ttsCachedUrl = null;
let ttsSessionId = null;
let ttsActiveBtn = null; // 'last' | 'tldr' | null

function resetTtsBtn() {
  const lastBtn = document.getElementById('ttsBtn');
  const tldrBtn = document.getElementById('tldrBtn');
  lastBtn.querySelector('.tts-label').textContent = 'Read Last';
  lastBtn.querySelector('.tts-icon').textContent = 'volume_up';
  lastBtn.classList.remove('loading', 'busy-state');
  lastBtn.style.display = '';
  tldrBtn.querySelector('.tts-label').textContent = 'TLDR';
  tldrBtn.querySelector('.tts-icon').textContent = 'summarize';
  tldrBtn.classList.remove('loading', 'busy-state');
  tldrBtn.style.display = '';
  ttsGenerating = false;
  ttsActiveBtn = null;
}

function cancelTtsSession() {
  if (ttsSessionId) {
    fetch('/api/tts-cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: ttsSessionId })
    }).catch(() => {});
    ttsSessionId = null;
  }
}

function stopTts() {
  ttsPlayer.pause();
  ttsPlayer.removeAttribute('src');
  ttsPlayer.load();
  if (window._hlsInstance) { window._hlsInstance.destroy(); window._hlsInstance = null; }
  cancelTtsSession();
  ttsCachedText = null;
  ttsCachedUrl = null;
  resetTtsBtn();
}

async function playTtsHls(text, btnId) {
  // Stop if already playing
  if (!ttsPlayer.paused) { stopTts(); return; }
  if (!selectedSession || !ttsEnabled || ttsGenerating) return;
  if (!text || !text.trim()) return;

  const btn = document.getElementById(btnId);
  const otherBtn = document.getElementById(btnId === 'ttsBtn' ? 'tldrBtn' : 'ttsBtn');

  ttsGenerating = true;
  ttsActiveBtn = btnId;
  btn.classList.add('loading', 'busy-state');
  btn.querySelector('.tts-label').textContent = 'Generating...';
  btn.querySelector('.tts-icon').textContent = 'hourglass_top';
  otherBtn.style.display = 'none';

  ttsPlayer.pause();
  ttsCachedText = null;
  ttsCachedUrl = null;

  // iOS user gesture unlock
  ttsPlayer.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
  ttsPlayer.play().catch(() => {});

  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  try {
    const res = await fetch('/api/tts-hls', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: text,
        voice: 'michael_caine',
        language: 'English',
        speed: 1.0,
        summarize: true
      })
    });

    if (!res.ok) throw new Error('TTS request failed');
    const data = await res.json();
    if (!data.playlist_url) throw new Error('No playlist URL');

    ttsSessionId = data.session_id || null;
    ttsCachedText = text;
    ttsCachedUrl = data.playlist_url;

    if (window._hlsInstance) { window._hlsInstance.destroy(); window._hlsInstance = null; }

    ttsPlayer.oncanplay = () => {
      btn.querySelector('.tts-label').textContent = 'Stop';
      btn.querySelector('.tts-icon').textContent = 'stop_circle';
      btn.classList.remove('loading');
    };
    ttsPlayer.onended = () => { resetTtsBtn(); if (window._hlsInstance) { window._hlsInstance.destroy(); window._hlsInstance = null; } };
    ttsPlayer.onerror = () => resetTtsBtn();

    if (window.Hls && Hls.isSupported()) {
      const hls = new Hls({
        enableWorker: false,
        maxBufferHole: 0.5,
        maxMaxBufferLength: 60,
        nudgeOffset: 0.1,
        nudgeMaxRetry: 5,
      });
      window._hlsInstance = hls;
      hls.loadSource(data.playlist_url);
      hls.attachMedia(ttsPlayer);
      hls.on(Hls.Events.ERROR, (_, d) => {
        if (d.fatal) resetTtsBtn();
      });
      await ttsPlayer.play();
    } else if (ttsPlayer.canPlayType('application/vnd.apple.mpegurl')) {
      ttsPlayer.src = data.playlist_url;
      ttsPlayer.load();
      await ttsPlayer.play();
    } else {
      throw new Error('HLS not supported');
    }
  } catch (e) {
    resetTtsBtn();
  } finally {
    ttsGenerating = false;
  }
}

function speakLastMessage() {
  const lastAssistant = [...currentMessages].reverse().find(m => m.role === 'assistant' && m.text);
  if (!lastAssistant) return;
  playTtsHls(lastAssistant.text, 'ttsBtn');
}

function speakTldr() {
  // Find last user message
  let lastUserIdx = -1;
  for (let i = currentMessages.length - 1; i >= 0; i--) {
    if (currentMessages[i].role === 'user') { lastUserIdx = i; break; }
  }

  // Collect all assistant messages since then
  const msgs = lastUserIdx >= 0
    ? currentMessages.slice(lastUserIdx + 1)
    : currentMessages;

  // Build briefing text
  let briefing = '';
  for (const m of msgs) {
    if (m.role !== 'assistant') continue;
    if (m.text) briefing += m.text + '\n\n';
    for (const t of (m.tools || [])) {
      briefing += 'Used ' + t.name + ': ' + t.summary + '\n';
    }
  }

  if (!briefing.trim()) return;
  playTtsHls(briefing, 'tldrBtn');
}

// --- Swipe to Skip/Unskip ---
(function() {
  let swipeTarget = null;
  let startX = 0, startY = 0, currentX = 0;
  let isSwiping = false;
  let directionLocked = false;

  document.addEventListener('touchstart', (e) => {
    const wrapper = e.target.closest('.session-item-wrapper');
    if (!wrapper) return;
    const item = wrapper.querySelector('.session-item');
    if (!item) return;
    swipeTarget = { wrapper, item };
    const touch = e.touches[0];
    startX = touch.clientX;
    startY = touch.clientY;
    currentX = 0;
    isSwiping = false;
    directionLocked = false;
    item.classList.remove('swipe-animating');
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!swipeTarget) return;
    const touch = e.touches[0];
    const deltaX = touch.clientX - startX;
    const deltaY = touch.clientY - startY;

    if (!directionLocked) {
      if (Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10) return;
      directionLocked = true;
      if (Math.abs(deltaY) > Math.abs(deltaX)) {
        // Vertical scroll — abort swipe
        swipeTarget = null;
        return;
      }
      isSwiping = true;
    }

    if (!isSwiping) return;

    // Only allow left swipe (negative deltaX)
    currentX = Math.min(0, deltaX);
    if (currentX < -20) {
      swipeTarget.item.style.transform = 'translateX(' + currentX + 'px)';
    }
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!swipeTarget || !isSwiping) {
      swipeTarget = null;
      return;
    }
    const { wrapper, item } = swipeTarget;
    swipeTarget = null;

    if (currentX < -80) {
      // Threshold reached — trigger skip/unskip
      item.classList.add('swipe-animating');
      item.style.transform = 'translateX(-100%)';
      const sessionName = wrapper.getAttribute('data-session-name');
      toggleSkip(sessionName);
    } else {
      // Snap back
      item.classList.add('swipe-animating');
      item.style.transform = 'translateX(0)';
    }
    isSwiping = false;
  }, { passive: true });
})();

async function toggleSkip(sessionName) {
  try {
    await fetch('/api/toggle-skip', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: sessionName })
    });
    lastSessionsJson = '';
    fetchSessions();
  } catch (e) { /* ignore */ }
}

// --- Picker Modal (FAB → Project List) ---
let pickerProjects = [];

async function openPicker() {
  history.pushState({ view: 'picker' }, '');
  document.getElementById('pickerModal').classList.add('active');
  document.getElementById('pickerSearch').value = '';
  document.getElementById('pickerList').innerHTML = '<div class="loading"><span class="dot-pulse">Loading projects...</span></div>';
  try {
    const res = await fetch('/api/projects');
    pickerProjects = await res.json();
    renderPickerList(pickerProjects);
  } catch (e) {
    document.getElementById('pickerList').innerHTML = '<div class="loading">Failed to load projects</div>';
  }
}

function closePicker() {
  if (document.getElementById('pickerModal').classList.contains('active')) {
    document.getElementById('pickerModal').classList.remove('active');
    history.back();
  }
}

function filterPicker() {
  const query = document.getElementById('pickerSearch').value.toLowerCase();
  const filtered = pickerProjects.filter(p => {
    const name = (p.display_name || p.key || '').toLowerCase();
    return name.includes(query) || (p.emoji || '').includes(query);
  });
  renderPickerList(filtered);
}

function renderPickerList(projects) {
  const el = document.getElementById('pickerList');
  if (!projects.length) {
    el.innerHTML = '<div class="loading">No projects found</div>';
    return;
  }
  el.innerHTML = projects.map(p => {
    const emoji = p.emoji || '\u{1F4E6}';
    const name = p.display_name || p.key;
    const exists = p.exists;
    const dotColor = exists ? 'var(--secondary)' : 'var(--outline)';
    const statusLabel = exists ? 'Running' : 'Not started';
    return `<div class="picker-item" data-session-name="${esc(p.session_name)}">
      <div class="picker-emoji">${emoji}</div>
      <div class="picker-info">
        <div class="picker-name">${esc(name)}</div>
        <div class="picker-status">
          <span class="picker-status-dot" style="background:${dotColor}"></span>
          <span class="picker-status-label">${statusLabel}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Event delegation for picker item clicks
document.getElementById('pickerList').addEventListener('click', (e) => {
  const item = e.target.closest('.picker-item');
  if (!item) return;
  const sessionName = item.getAttribute('data-session-name');
  if (sessionName) connectProject(sessionName);
});

async function connectProject(sessionName) {
  try {
    await fetch('/api/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_name: sessionName })
    });
  } catch (e) { /* ignore */ }
  document.getElementById('pickerModal').classList.remove('active');
  // Pop the picker state
  history.back();
  lastSessionsJson = '';
  fetchSessions();
}

// --- Session Info Modal ---
let currentInfoSession = null;
let currentInfoData = null;

async function openSessionInfo() {
  if (!selectedSession) return;
  currentInfoSession = selectedSession;
  history.pushState({ view: 'info' }, '');
  document.getElementById('infoModal').classList.add('active');
  document.getElementById('infoModalContent').innerHTML = '<div class="loading"><span class="dot-pulse">Loading...</span></div>';

  try {
    const res = await fetch('/api/session-info?session=' + encodeURIComponent(selectedSession));
    currentInfoData = await res.json();
    renderInfoModal(currentInfoData);
  } catch (e) {
    document.getElementById('infoModalContent').innerHTML = '<div class="loading">Failed to load session info</div>';
  }
}

function closeInfoModal(event) {
  if (event && event.target !== document.getElementById('infoModal') && !event.target.classList.contains('modal-close') && !event.target.closest('.modal-close')) return;
  if (document.getElementById('infoModal').classList.contains('active')) {
    document.getElementById('infoModal').classList.remove('active');
    history.back();
  }
}

function renderInfoModal(data) {
  document.getElementById('infoModalTitle').textContent = data.name || 'Session Info';
  let html = '';

  // Section 1: Directory & Ports
  html += '<div class="info-section">';
  html += '<div class="info-section-title">Directory</div>';
  if (data.cwd) {
    html += '<div style="font-size:12px;font-family:monospace;word-break:break-all;color:var(--on-surface);line-height:1.5;padding:0 2px">' + esc(data.cwd) + '</div>';
  }
  if (data.ports && data.ports.length > 0) {
    html += '<div class="info-row" style="margin-top:10px"><span class="info-label">Ports</span><div class="info-pills">' +
      data.ports.map(p => '<span class="info-pill">' + p + '</span>').join('') +
      '</div></div>';
  }
  html += '</div>';

  // Section 2: Todos
  html += '<div class="info-section">';
  html += '<div class="info-section-title">Todos</div>';
  html += '<div id="infoTodoList">';
  html += renderTodoList(data.todos || []);
  html += '</div>';
  html += '<div class="todo-add-row">';
  html += '<input type="text" id="todoAddInput" placeholder="Add a todo..." onkeydown="if(event.key===\'Enter\'){event.preventDefault();addTodo();}">';
  html += '<button class="todo-add-btn" onclick="addTodo()"><span class="material-symbols-outlined">add</span></button>';
  html += '</div>';
  html += '</div>';

  // Section 3: Flags
  html += '<div class="info-section">';
  html += '<div class="info-section-title">Flags</div>';
  html += renderToggleRow('star', 'Favorite', 'favorite', data.favorite);
  html += renderToggleRow('verified', 'Auto-approve', 'auto_approve', data.auto_approve);
  html += renderToggleRow('visibility_off', 'Skip', 'skip', data.skipped);
  html += '</div>';

  // Section 4: Processes (last, single line each, filtered to meaningful ones)
  const procs = data.processes || [];
  if (procs.length > 0) {
    html += '<div class="info-section">';
    html += '<div class="info-section-title">Processes</div>';
    procs.forEach(p => {
      const mem = p.memory_kb > 0 ? Math.round(p.memory_kb / 1024) + 'MB' : '';
      const cpu = p.cpu_percent > 0 ? p.cpu_percent.toFixed(1) + '%' : '';
      const meta = [cpu, mem].filter(Boolean).join(' · ');
      html += '<div class="process-item"><div class="process-name">' + esc(p.name) + '</div>';
      if (meta) html += '<div class="process-meta">' + meta + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Section 5: Danger zone
  html += '<div class="info-section" style="padding-top:8px">';
  html += '<button class="kill-session-btn" onclick="confirmKillSession()"><span class="material-symbols-outlined">power_settings_new</span>Kill Session</button>';
  html += '</div>';

  document.getElementById('infoModalContent').innerHTML = html;
}

async function confirmKillSession() {
  if (!currentInfoSession) return;
  const name = currentInfoSession;
  if (!confirm('Kill session "' + name + '"? This will terminate all processes in the tmux session.')) return;
  try {
    await fetch('/api/kill-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: name })
    });
    closeInfoModal();
    history.back(); // go back to session list
    lastSessionsJson = '';
    fetchSessions();
  } catch (e) { /* ignore */ }
}

function renderToggleRow(icon, label, flag, isActive) {
  const activeClass = isActive ? ' active' : '';
  return `<div class="toggle-row">
    <div class="toggle-row-left">
      <span class="material-symbols-outlined">${icon}</span>
      <span class="toggle-row-label">${label}</span>
    </div>
    <button class="toggle-switch${activeClass}" onclick="toggleFlag('${flag}', this)"></button>
  </div>`;
}

async function toggleFlag(flag, btn) {
  if (!currentInfoSession) return;
  try {
    const res = await fetch('/api/toggle-flag', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: currentInfoSession, flag: flag })
    });
    const result = await res.json();
    if (result.ok) {
      if (result.value) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
      // Refresh session list in background
      lastSessionsJson = '';
      fetchSessions();
    }
  } catch (e) { /* ignore */ }
}

function renderTodoList(todos) {
  if (!todos || !todos.length) {
    return '<div style="padding:8px 0;font-size:13px;color:var(--outline)">No active todos</div>';
  }
  return todos.map((t, i) => {
    return `<div class="todo-item">
      <span class="todo-text">${esc(t)}</span>
      <div class="todo-actions">
        <button class="todo-action-btn done-btn" onclick="todoDone(${i + 1})"><span class="material-symbols-outlined" style="font-size:18px">check</span></button>
        <button class="todo-action-btn delete-btn" onclick="todoDelete(${i + 1})"><span class="material-symbols-outlined" style="font-size:18px">delete</span></button>
      </div>
    </div>`;
  }).join('');
}

async function addTodo() {
  if (!currentInfoSession) return;
  const input = document.getElementById('todoAddInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  try {
    const res = await fetch('/api/todos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: currentInfoSession, action: 'add', text: text })
    });
    const result = await res.json();
    if (result.ok) {
      document.getElementById('infoTodoList').innerHTML = renderTodoList(result.todos);
      lastSessionsJson = '';
      fetchSessions();
    }
  } catch (e) { /* ignore */ }
}

async function todoDone(index) {
  if (!currentInfoSession) return;
  try {
    const res = await fetch('/api/todos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: currentInfoSession, action: 'done', index: index })
    });
    const result = await res.json();
    if (result.ok) {
      document.getElementById('infoTodoList').innerHTML = renderTodoList(result.todos);
      lastSessionsJson = '';
      fetchSessions();
    }
  } catch (e) { /* ignore */ }
}

async function todoDelete(index) {
  if (!currentInfoSession) return;
  try {
    const res = await fetch('/api/todos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: currentInfoSession, action: 'delete', index: index })
    });
    const result = await res.json();
    if (result.ok) {
      document.getElementById('infoTodoList').innerHTML = renderTodoList(result.todos);
      lastSessionsJson = '';
      fetchSessions();
    }
  } catch (e) { /* ignore */ }
}

function jumpToBottom() {
  const chatArea = document.getElementById('chatArea');
  chatArea.scrollTop = chatArea.scrollHeight;
  wasAtBottom = true;
}

document.getElementById('chatArea').addEventListener('scroll', () => {
  const chatArea = document.getElementById('chatArea');
  const atBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 40;
  const btn = document.getElementById('jumpBottom');
  const bar = document.querySelector('.bottom-bar');
  if (atBottom) {
    btn.classList.add('hidden');
    bar.classList.remove('collapsed');
  } else {
    btn.classList.remove('hidden');
    bar.classList.add('collapsed');
  }
});

// --- iOS keyboard viewport fix ---
// Body is position:fixed. We set its height to the visual viewport height
// so the entire app shrinks when the keyboard opens. No position:fixed on
// any child — everything is in normal flow and flexbox handles the rest.
function updateAppHeight() {
  const vv = window.visualViewport;
  if (vv) {
    document.body.style.height = vv.height + 'px';
    // Counter any iOS scroll offset
    document.body.style.top = vv.offsetTop + 'px';
  } else {
    document.body.style.height = window.innerHeight + 'px';
  }
}
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', updateAppHeight);
  window.visualViewport.addEventListener('scroll', updateAppHeight);
}
window.addEventListener('resize', updateAppHeight);
updateAppHeight();

// Start polling
fetchSessions();
pollTimer = setInterval(fetchSessions, 1500);
